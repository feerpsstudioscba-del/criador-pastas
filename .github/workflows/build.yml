name: Build All-in-One

on:
  push:
    branches: [ main, master ]
  release:
    types: [published]

jobs:
  build-windows:
    runs-on: windows-latest
    name: Build Windows

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fonttools brotli

    - name: Install Node.js dependencies
      run: npm ci

    - name: Create GIF Export resources
      shell: powershell
      run: |
        New-Item -ItemType Directory -Path "resources/gif-export" -Force | Out-Null
        New-Item -ItemType Directory -Path "resources/gif-export/IMAGENS" -Force | Out-Null
        New-Item -ItemType Directory -Path "resources/gif-export/FONTS" -Force | Out-Null
        Add-Content -Path "resources/gif-export/.gitkeep" -Value "" -Force

    - name: Build Windows executable
      run: npm run build

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: All-in-One-Windows
        path: dist/*.exe
        if-no-files-found: warn

  build-mac:
    runs-on: macos-latest
    name: Build Mac

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fonttools brotli

    - name: Install Node.js dependencies
      run: npm ci

    - name: Create GIF Export resources
      run: |
        mkdir -p resources/gif-export/IMAGENS
        mkdir -p resources/gif-export/FONTS
        touch resources/gif-export/.gitkeep

    - name: Build Mac app
      run: npm run build:mac

    - name: Upload Mac artifact
      uses: actions/upload-artifact@v4
      with:
        name: All-in-One-Mac
        path: dist/*.dmg
        if-no-files-found: warn

  release-artifacts:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    name: Create Release
    if: github.event_name == 'release'

    steps:
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: All-in-One-Windows
        path: windows

    - name: Download Mac artifact
      uses: actions/download-artifact@v4
      with:
        name: All-in-One-Mac
        path: mac

    - name: Upload Release Assets
      uses: softprops/action-gh-release@v2
      with:
        files: |
          windows/*.exe
          mac/*.dmg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
name: Build All-in-One

on:
  push:
    branches: [ main, master ]
  release:
    types: [published]

jobs:
  build-windows:
    runs-on: windows-latest
    name: Build Windows

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fonttools brotli

    - name: Install Node.js dependencies
      run: npm install

    - name: Create GIF Export stub (if missing)
      shell: powershell
      run: |
        if (-not (Test-Path "resources/gif-export")) {
          New-Item -ItemType Directory -Path "resources/gif-export" -Force | Out-Null
          Add-Content -Path "resources/gif-export/.gitkeep" -Value ""
        }

    - name: Build Windows executable
      run: npm run build

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: All-in-One-Windows
        path: dist/*.exe

  build-mac:
    runs-on: macos-latest
    name: Build Mac

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fonttools brotli

    - name: Install Node.js dependencies
      run: npm install

    - name: Create GIF Export stub (if missing)
      run: |
        mkdir -p resources/gif-export
        touch resources/gif-export/.gitkeep

    - name: Build Mac app
      run: npm run build:mac

    - name: Upload Mac artifact
      uses: actions/upload-artifact@v4
      with:
        name: All-in-One-Mac
        path: dist/*.dmg

  release-artifacts:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    name: Create Release
    if: github.event_name == 'release'

    steps:
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: All-in-One-Windows
        path: windows

    - name: Download Mac artifact
      uses: actions/download-artifact@v4
      with:
        name: All-in-One-Mac
        path: mac

    - name: Upload Release Assets
      uses: softprops/action-gh-release@v1
      with:
        files: |
          windows/*.exe
          mac/*.dmg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}